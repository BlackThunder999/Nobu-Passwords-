<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nobu Password Generator</title>

    <meta name="description"
        content="Generate secure random passwords instantly with Nobu Password Generator.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background"></div>

    <main class="container">

        <div class="logo">
            🔒
        </div>

        <h1>Nobu Password Generator</h1>

        <p class="subtitle">
            Create secure passwords in seconds
        </p>

        <section class="generator-card">

            <div class="password-container">

                <input
                    id="password"
                    type="text"
                    placeholder="Click Generate"
                    readonly>

                <button id="copyBtn" title="Copy Password">
                    📋
                </button>

            </div>

            <div class="settings">

                <div class="setting-header">

                    <span>Password Length</span>

                    <strong id="lengthValue">
                        16
                    </strong>

                </div>

                <input
                    id="length"
                    type="range"
                    min="4"
                    max="64"
                    value="16">

                <label class="checkbox">

                    <input
                        id="uppercase"
                        type="checkbox"
                        checked>

                    Uppercase Letters

                </label>

                <label class="checkbox">

                    <input
                        id="lowercase"
                        type="checkbox"
                        checked>

                    Lowercase Letters

                </label>

                <label class="checkbox">

                    <input
                        id="numbers"
                        type="checkbox"
                        checked>

                    Numbers

                </label>

                <label class="checkbox">

                    <input
                        id="symbols"
                        type="checkbox"
                        checked>

                    Symbols

                </label>

            </div>

            <button
                id="generateBtn"
                class="generate-button">

                Generate Password

            </button>

            <div class="strength">

                <div class="strength-bar">

                    <div id="strengthFill"></div>

                </div>

                <p id="strengthText">
                    Strong
                </p>

            </div>

        </section>

        <section class="privacy-card">

            <h2>
                🔒 Privacy
            </h2>

            <p>

                All passwords are generated randomly directly in your browser.

                Nobu does not collect, store, transmit or have access to your generated passwords.

            </p>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
