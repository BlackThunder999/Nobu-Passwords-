<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nobu Password Generator</title>

<meta name="description"
content="Generate secure passwords instantly with Nobu Password Generator.">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<main class="container">

<header>

<div class="logo">

N

</div>

<div class="top-buttons">

<button id="themeBtn">

🌙

</button>

<div class="language-switch">

<button id="langEn" class="active">

EN

</button>

<button id="langRu">

RU

</button>

</div>

</div>

</header>

<h1 id="title">

Nobu Password Generator

</h1>

<p id="subtitle">

Create secure passwords in seconds

</p>

<div class="generator-card">

<div class="password-box">

<input

id="password"

type="password"

readonly

placeholder="Click Generate">

<button id="showBtn">

👁

</button>

<button id="copyBtn">

📋

</button>

<button id="refreshBtn">

🎲

</button>

</div>

<div class="setting-header">

<span id="lengthText">

Password Length

</span>

<strong id="lengthValue">

16

</strong>

</div>

<input

type="range"

id="length"

min="4"

max="64"

value="16">

<label class="checkbox">

<input type="checkbox" id="uppercase" checked>

<span id="uppercaseText">

Uppercase Letters

</span>

</label>

<label class="checkbox">

<input type="checkbox" id="lowercase" checked>

<span id="lowercaseText">

Lowercase Letters

</span>

</label>
<label class="checkbox">

    <input type="checkbox" id="numbers" checked>

    <span id="numbersText">
        Numbers
    </span>

</label>

<label class="checkbox">

    <input type="checkbox" id="symbols" checked>

    <span id="symbolsText">
        Symbols
    </span>

</label>

<button id="generateBtn">

    Generate Password

</button>

<div class="strength">

    <div class="strength-bar">

        <div id="strengthFill"></div>

    </div>

    <p id="strengthText">

        Strong

    </p>

</div>

</div>

<div class="privacy-card">

    <h2 id="privacyTitle">

        🔒 Privacy

    </h2>

    <p id="privacyText">

        All passwords are generated locally in your browser.

        Nobu does not collect, store, transmit or have access to your generated passwords.

    </p>

</div>

</main>

<script src="script.js"></script>

</body>

</html>
